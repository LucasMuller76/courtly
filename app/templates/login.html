{% extends "base.html" %}

{% block title %}Entrar — Courtly{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">🎾 Courtly</h1>
      <p class="text-gray-500 mt-1 text-sm">Secretária Virtual para Padel</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-6">Entrar na sua conta</h2>

      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/auth/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input
            type="email"
            name="email"
            required
            autocomplete="email"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="seu@email.com"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="••••••••"
          >
        </div>

        <button
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-medium
                 py-2.5 px-4 rounded-lg text-sm transition-colors"
        >
          Entrar
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Novo por aqui?
        <a href="/register" class="text-green-600 hover:underline font-medium">Criar conta</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
